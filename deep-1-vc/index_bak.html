<style>
:root {
  --bg: #000000;
  --card: #0A0E17;
  --card-border: #1A1F2E;
  --text: #FFFFFF;
  --text-dim: #8E9AA6;
  --green: #39FF14;
  --cyan: #00E5FF;
  --purple: #B026FF;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased
}
.scanlines{
  position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  animation:scanlineMove .5s linear infinite
}
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(57,255,20,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,.04) 1px,transparent 1px);
  background-size:40px 40px
}
.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(80px);opacity:0.12;
  animation:orbFloat 25s infinite ease-in-out
}
.particle{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:0
}
.progress-bar{
  position:fixed;top:0;left:0;height:2px;z-index:100;
  background:linear-gradient(90deg,var(--green),var(--cyan),var(--purple),var(--green));
  background-size:200% 100%;
  animation:shimmer 3s linear infinite;
  transition:width .5s cubic-bezier(.16,1,.3,1)
}
@keyframes scanlineMove{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes orbFloat{
  0%,100%{transform:translate(0,0)scale(1)}
  25%{transform:translate(40px,-30px)scale(1.1)}
  50%{transform:translate(-30px,40px)scale(.9)}
  75%{transform:translate(30px,30px)scale(1.05)}
}
@keyframes float{
  0%{transform:translateY(0)translateX(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-100vh)translateX(100px);opacity:0}
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes slideIn{
  from{opacity:0;transform:translateX(50px)scale(.98)}
  to{opacity:1;transform:translateX(0)scale(1)}
}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 8px rgba(57,255,20,.2)}50%{box-shadow:0 0 20px rgba(57,255,20,.5),0 0 40px rgba(57,255,20,.2)}}
@keyframes pulseGlowCyan{0%,100%{box-shadow:0 0 8px rgba(0,229,255,.2)}50%{box-shadow:0 0 20px rgba(0,229,255,.5),0 0 40px rgba(0,229,255,.2)}}
@keyframes navGlow{
  0%,100%{box-shadow:0 0 8px rgba(57,255,20,.15),0 0 16px rgba(57,255,20,.05)}
  50%{box-shadow:0 0 20px rgba(57,255,20,.3),0 0 40px rgba(57,255,20,.1)}
}
@keyframes navGlowCyan{
  0%,100%{box-shadow:0 0 8px rgba(0,229,255,.15),0 0 16px rgba(0,229,255,.05)}
  50%{box-shadow:0 0 20px rgba(0,229,255,.3),0 0 40px rgba(0,229,255,.1)}
}
@keyframes rotateGlow{
  0%{transform:rotate(0deg)}
  100%{transform:rotate(360deg)}
}
@keyframes glitchShift{
  0%{transform:translate(0);opacity:0}
  10%{transform:translate(-2px,1px);opacity:.7}
  20%{transform:translate(2px,-1px);opacity:0}
  30%{transform:translate(-1px,2px);opacity:.5}
  40%{transform:translate(1px,-2px);opacity:0}
  100%{transform:translate(0);opacity:0}
}
@keyframes flicker{
  0%,100%{opacity:1}
  41%{opacity:1}
  42%{opacity:.8}
  43%{opacity:1}
  45%{opacity:.3}
  46%{opacity:1}
}
.glitch-text{animation:glitchShift 3s infinite;position:relative}
.glitch-text::before,.glitch-text::after{
  content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;opacity:0
}
.glitch-text::before{color:var(--green);animation:glitchShift 3s infinite;clip-path:inset(20% 0 60% 0)}
.glitch-text::after{color:var(--cyan);animation:glitchShift 2.5s infinite reverse;clip-path:inset(60% 0 20% 0)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(57,255,20,.3);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(57,255,20,.5)}
</style>

      <div style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(26,31,46,.8);display:flex;align-items:center;justify-content:center">

      </div>

    <button id="prevBtn" style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;animation:navGlow 3s ease-in-out infinite" onmouseenter="this.style.color='#fff';this.style.borderColor='rgba(57,255,20,.3)'" onmouseleave="this.style.color='var(--text-dim)';this.style.borderColor='var(--card-border)'" disabled>
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      <span style="display:none" class="nav-text">Previous</span>
    </button>

    <div id="dotContainer" style="display:flex;align-items:center;gap:6px"></div>

    <button id="nextBtn" style="display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:var(--card);border:1px solid var(--card-border);color:var(--text-dim);cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;animation:navGlowCyan 3s ease-in-out infinite" onmouseenter="this.style.color='#fff';this.style.borderColor='rgba(0,229,255,.3)'" onmouseleave="this.style.color='var(--text-dim)';this.style.borderColor='var(--card-border)'">
      <span style="display:none" class="nav-text">Next</span>
      <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>
  </footer>
</div>

const GLOSSARY = [

  { type:'title', content:{ title:'30 Istilah <span style="color:#39FF14">Vibe Coding</span>', subtitle:'Glossarium lengkap dari A-Z untuk pemula hingga advanced', tags:['Fundamental','Prompting','Tools','Workflow','Quality'] } },
  // ── OPENING ──
  { type:'opening', content:{
    title:'Ketika Istilah Baru Bikin <span style="color:#00E5FF">Overwhelmed</span>',
    story:'Kamu baru mulai tertarik dengan vibe coding. Buka YouTube, cari tutorial, excited banget mau belajar. Video pertama dimulai: "Okay, kita akan pakai Cursor sebagai AI code editor. Pastikan context window cukup untuk project kamu. Nanti kita inject context dari beberapa files, pakai few-shot prompting..." Kamu pause video. "Wait... apa tadi? Context window? Few-shot? Hallucination? Grounding? Ini bahasa planet mana?"',
    quote:'Sebelum bisa master vibe coding, kamu perlu paham bahasanya dulu.',
    note:'30 istilah ini dikelompokkan ke dalam 5 kategori. Masing-masing dengan definisi, analogi, tips, dan contoh praktis.'
  }},
  // ── OVERVIEW ──
  { type:'overview', content:{

      { num:'04', name:'Workflow', count:'5', desc:'Teknik kerja sehari-hari', color:'green' },
      { num:'05', name:'Quality', count:'4', desc:'Menjaga kualitas output AI coding', color:'cyan' },
    ]
  }},

  // ════════════════════════════════════════════
  // KATEGORI 1: FUNDAMENTAL (8 istilah)
  // ════════════════════════════════════════════
  { type:'category-header', content:{ num:'01', name:'Fundamental Vibe Coding', count:'8 istilah', desc:'Dasar-dasar yang membentuk pemahaman inti — istilah yang akan kamu temui di setiap diskusi tentang vibe coding.', color:'green' } },

  { type:'term', content:{ num:1, title:'Vibe Coding', category:'Fundamental', color:'green',
    def:'Pendekatan development di mana developer menggunakan AI sebagai collaborative partner untuk menulis code melalui natural language. Istilah "vibe" merujuk pada flow kolaboratif antara manusia dan AI — kamu describe "vibe" yang diinginkan, AI bantu wujudkan.',
    analogy:'Seperti bekerja dengan co-pilot pesawat. Kamu pilot utama yang menentukan destination dan membuat keputusan critical. AI co-pilot membantu navigation, monitor instruments, handle routine tasks.',
    tips:'Treat AI sebagai junior developer yang capable tapi perlu direction. Clear instruction = better output. Iterate dan refine — jangan expect perfect di first attempt.'
  }},
  { type:'term', content:{ num:2, title:'AI Code Editor', category:'Fundamental', color:'green',
    def:'Code editor yang terintegrasi dengan AI capabilities secara native — code generation, intelligent completion, refactoring, dan assistance langsung dalam editor. Menyatukan coding dan AI assistance dalam satu environment seamless.',
    analogy:'Kalau code editor biasa seperti mesin ketik canggih, AI code editor seperti mesin ketik yang punya asisten duduk di sebelah kamu, siap membantu kapan saja tanpa kamu harus keluar dari flow.',
    tools:'Cursor (paling populer), GitHub Copilot + VS Code, Windsurf, Zed, Void, Continue',
    tips:'Learn keyboard shortcuts — Cmd+L (chat), Cmd+K (inline), Cmd+I (composer). Gunakan @mentions untuk include specific files sebagai context.'
  }},
  { type:'term', content:{ num:3, title:'Code Generation', category:'Fundamental', color:'green',
    def:'Proses AI menghasilkan code berdasarkan instruksi bahasa natural, partial code, atau specifications — dari single function sampai entire features dengan struktur yang konsisten.',
    analogy:'Seperti memesan pakaian ke tailor custom. Kamu describe apa yang kamu mau, tailor (AI) mewujudkannya. Semakin detail description-nya, semakin sesuai hasilnya.',
    levels:'Level 1: Single function. Level 2: Component. Level 3: Feature (multi-function). Level 4: System (multiple files, API, DB).',
    tips:'Start simple, build complexity incrementally. Always specify tech stack dan language. Include edge cases yang harus di-handle.'
  }},
  { type:'term', content:{ num:4, title:'Natural Language Programming', category:'Fundamental', color:'green',
    def:'Paradigma programming di mana developer menggunakan bahasa manusia (bukan programming language) untuk menginstruksikan komputer atau AI apa yang harus dilakukan.',
    analogy:'Bayangkan punya translator yang fasih semua bahasa programming. Kamu bicara Bahasa Indonesia: "Filter produk yang harganya di bawah 100 ribu." Translator convert ke Python, JavaScript, SQL — dengan syntax yang benar.',
    tips:'Describe WHAT you want, bukan HOW to implement. Be specific tentang input dan expected output. Include example data kalau structure complex.'
  }},
  { type:'term', content:{ num:5, title:'AI Pair Programming', category:'Fundamental', color:'green',
    def:'Collaborative coding practice di mana developer bekerja bersama AI sebagai "pair" — satu pihak think, plan, dan direct (human), satu pihak execute, suggest, dan assist (AI).',
    analogy:'Traditional pair programming: Driver (yang ketik) + Navigator (yang guide). Dalam AI pair programming, kamu sebagai Navigator, AI sebagai Driver yang sangat cepat dan punya knowledge luas.',
    tips:'Treat AI sebagai pair yang knowledgeable, bukan just executor. Ask untuk suggestions dan alternatives. Maintain dialogue, bukan monologue.'
  }},
  { type:'term', content:{ num:6, title:'Prompt-to-Code', category:'Fundamental', color:'green',
    def:'Pipeline di mana text prompt ditransformasi menjadi working code — dari input natural language instruction hingga output executable code yang bisa langsung dijalankan.',
    analogy:'Seperti vending machine canggih. Masukkan request (prompt), mesin process, keluar produk (code). Kamu bisa fine-tune request dan iterate sampai sesuai keinginan.',
    tips:'Structure prompt seperti spec document untuk complex features. Include ALL requirements upfront. Test generated code sebelum move on.'
  }},
  { type:'term', content:{ num:7, title:'Context Window', category:'Fundamental', color:'green',
    def:'"Memory" atau batasan seberapa banyak informasi (code, conversation history, files) yang bisa AI lihat dan pertimbangkan saat generate response. Di luar context window = AI tidak tahu exists.',
    analogy:'Seperti meja kerja dengan ukuran terbatas. Semakin besar meja, semakin banyak dokumen yang bisa dikerjakan bersamaan. Context window = ukuran meja AI.',
    sizes:'Small (8K-16K): 1-3 file. Medium (32K-64K): 5-10 file. Large (128K-200K): 20+ file. Claude 3.5: 200K tokens ≈ 500 halaman.',
    tips:'Provide relevant files sebagai context dengan @mentions. Prioritize most relevant context — quality over quantity.'
  }},
  { type:'term', content:{ num:8, title:'Token', category:'Fundamental', color:'green',
    def:'Unit pengukuran untuk text yang diproses AI. Menentukan: (1) berapa banyak code yang bisa diproses, (2) berapa banyak yang bisa di-generate, (3) berapa biaya API usage.',
    analogy:'Token seperti kredit di arcade game. Setiap action butuh kredit. Prompt panjang = lebih banyak kredit. Tapi beda game (model) punya kurs kredit berbeda.',
    tips:'Concise prompts save tokens tanpa sacrifice clarity. Reuse context dari previous messages. Use cheaper models untuk simple tasks (GPT-4o-mini, Haiku).'
  }},

  // ════════════════════════════════════════════
  // KATEGORI 2: PROMPTING & COMMUNICATION (7 istilah)
  // ════════════════════════════════════════════
  { type:'category-header', content:{ num:'02', name:'Prompting & Communication', count:'7 istilah', desc:'Cara berkomunikasi dengan AI untuk mendapatkan hasil terbaik — skill yang membedakan beginner dari advanced vibe coder.', color:'cyan' } },

  { type:'term', content:{ num:9, title:'Prompt Engineering', category:'Prompting', color:'cyan',
    def:'Skill dan practice dalam merancang prompts yang efektif untuk mendapatkan hasil optimal dari AI. Core skill yang membedakan beginner dari advanced vibe coder.',
    analogy:'Seperti belajar "bahasa" untuk komunikasi dengan orang dari budaya berbeda. Ada cara tertentu menyampaikan maksud agar dipahami dengan tepat.',
    techniques:'Be Specific · Provide Context · Specify Output Format · Use Role/Persona · Include Examples · Set Constraints',
    tips:'Build personal prompt library untuk common tasks. Iterate dan refine berdasarkan results. Different tasks need different prompt styles.'
  }},
  { type:'term', content:{ num:10, title:'System Prompt', category:'Prompting', color:'cyan',
    def:'Instruksi permanen yang mengatur behavior, personality, knowledge boundaries, dan rules AI sepanjang conversation. Set the "operating mode" untuk keseluruhan session.',
    analogy:'Seperti employee handbook dan job description untuk karyawan baru. Sebelum mulai kerja, kamu jelaskan role, standard, tools, dan guidelines yang harus diikuti.',
    tips:'Set system prompt di awal setiap project. Save untuk reuse. Include tech stack ALWAYS. Be specific tentang response style preferences.',
    mistakes:'Skip system prompt → inconsistent outputs. Too generic → tidak membantu. Not updating for different projects → wrong context.'
  }},
  { type:'term', content:{ num:11, title:'Instruction Prompt', category:'Prompting', color:'cyan',
    def:'Prompt spesifik yang memberikan task atau perintah tertentu kepada AI per-request. Bekerja di dalam framework yang sudah di-set oleh system prompt.',
    analogy:'Kalau system prompt adalah job description, instruction prompt adalah task assignment harian. "Kerjakan laporan Q3" = instruction. "Kamu adalah financial analyst" = system.',
    tips:'One clear instruction per prompt. Include input/output specs untuk clarity. Keep instruction focused — big tasks should be broken down.'
  }},
  { type:'term', content:{ num:12, title:'Few-shot Prompting', category:'Prompting', color:'cyan',
    def:'Teknik prompting di mana kamu memberikan beberapa contoh (2-5) sebelum actual task untuk "mengajarkan" pattern, format, atau style yang diinginkan ke AI.',
    analogy:'Seperti training karyawan baru dengan menunjukkan contoh pekerjaan. "Lihat bagaimana kita format report-nya. Sekarang buatkan serupa untuk data ini."',
    tips:'2-3 examples biasanya cukup. Make examples clear, consistent, dan representative. Place examples BEFORE actual task. Quality > quantity.',
    mistakes:'Inconsistent examples → AI gets confused. Too many examples → diminishing returns. Examples don\'t match task complexity → wrong expectations.'
  }},
  { type:'term', content:{ num:13, title:'Chain-of-Thought (CoT)', category:'Prompting', color:'cyan',
    def:'Teknik yang meminta AI untuk menjelaskan reasoning step-by-step sebelum memberikan final answer. Membantu untuk complex logic, debugging, dan architectural decisions.',
    analogy:'Seperti meminta siswa menunjukkan "cara penyelesaian" di ujian matematika, bukan hanya jawaban akhir. Step-by-step reasoning membuat thinking process visible.',
    tips:'Gunakan untuk complex problems, bukan simple tasks. "Think step by step" adalah magic phrase. Read dan verify the reasoning.',
    mistakes:'Using CoT untuk very simple tasks → overkill. Not reading the reasoning → miss insights. Skipping CoT untuk complex tasks → suboptimal.'
  }},
  { type:'term', content:{ num:14, title:'Iterative Prompting', category:'Prompting', color:'cyan',
    def:'Pendekatan di mana kamu build output secara incremental melalui multiple rounds of prompts. Setiap round refine, extend, atau improve pada previous output.',
    analogy:'Seperti sculptor yang membentuk patung secara bertahap. Mulai dari rough shape, refine outlines, add details, polish surface.',
    tips:'Plan iterations sebelum starting. Verify EACH iteration works before moving on. Small iterations = easier debugging. Keep context across iterations.',
    mistakes:'Trying to do everything in one prompt → overwhelming. Not verifying each iteration → compound errors. Moving on too fast → bugs in foundation.'
  }},
  { type:'term', content:{ num:15, title:'Context Injection', category:'Prompting', color:'cyan',
    def:'Teknik menyertakan relevant code, files, documentation, atau information ke dalam prompt agar AI memiliki context yang cukup untuk response yang accurate dan consistent.',
    analogy:'Seperti memberikan brief lengkap ke designer: brand guidelines, color palette, existing assets, target audience. More context = better output.',
    tips:'Use @mentions di Cursor untuk automatic file inclusion. Include only RELEVANT context. Create "context snapshots" untuk frequently used contexts.',
    mistakes:'No context injection → AI makes assumptions. Too much irrelevant → dilutes focus. Outdated context → wrong assumptions. Forgetting types → type errors.'
  }},

  // ════════════════════════════════════════════
  // KATEGORI 3: TOOLS & ENVIRONMENT (6 istilah)
  // ════════════════════════════════════════════
  { type:'category-header', content:{ num:'03', name:'Tools & Environment', count:'6 istilah', desc:'Alat-alat yang digunakan dalam ekosistem vibe coding — sama seperti carpenter perlu tau berbagai jenis tools untuk berbagai pekerjaan.', color:'purple' } },

  { type:'term', content:{ num:16, title:'Cursor', category:'Tools', color:'purple',
    def:'AI-first code editor dibangun di atas VS Code dengan integrasi AI native untuk code generation, editing, refactoring, dan assistance. Tool paling populer untuk vibe coding saat ini.',
    analogy:'Kalau VS Code adalah mobil manual yang powerful, Cursor adalah mobil dengan advanced driver assistance system (ADAS). Kamu tetap in control, tapi driving jadi lebih effortless.',

  { type:'term', content:{ num:17, title:'GitHub Copilot', category:'Tools', color:'purple',
    def:'AI coding assistant dari GitHub (Microsoft) yang menyediakan code suggestions dan completions berbasis AI. Bekerja sebagai extension di VS Code, JetBrains, dan editors lain.',

  { type:'term', content:{ num:18, title:'Claude Code', category:'Tools', color:'purple',
    def:'Terminal-based AI coding tool dari Anthropic yang memungkinkan interaksi dengan Claude untuk coding tasks langsung dari command line — bisa membaca, menulis, dan menjalankan perintah.',
    analogy:'Seperti punya senior developer yang bisa kamu panggil dari terminal. Dia bisa lihat semua file, edit langsung, run commands, dan explain apa yang dia lakukan.',

// ── Navigation ──
function goTo(idx){
  if(idx<0||idx>=slides.length)return;
  current=idx;
  renderCurrent();
  updateDots();
  updateNav();
  updateProgress();
  updateCounter();
}

function updateNav(){
  const p=document.getElementById('prevBtn');
  const n=document.getElementById('nextBtn');
  if(p){p.disabled=current===0;p.style.opacity=current===0?'.3':'1';p.style.cursor=current===0?'not-allowed':'pointer'}
  if(n){n.disabled=current===slides.length-1;n.style.opacity=current===slides.length-1?'.3':'1';n.style.cursor=current===slides.length-1?'not-allowed':'pointer'}
}

function updateProgress(){
  const bar=document.getElementById('progressBar');
  if(bar) bar.style.width=((current+1)/slides.length*100)+'%';
}

function updateCounter(){
  const sc=document.getElementById('slideLabel');
  if(sc) sc.textContent=`${String(current+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}`;
}

function renderCurrent(){
  const container=document.getElementById('slideContainer');
  if(!container)return;
  container.innerHTML=renderSlide(slides[current],current);
  const el=container.querySelector('.slide-inner');
  if(el){
    el.style.animation='none';
    requestAnimationFrame(()=>{el.style.animation='slideIn .45s cubic-bezier(.16,1,.3,1) forwards'});
  }
}

function updateDots(){
  document.querySelectorAll('#dotContainer button').forEach((dot,i)=>{
    dot.style.background=i===current?'#39FF14':'rgba(142,154,166,.15)';
    dot.style.boxShadow=i===current?'0 0 8px rgba(57,255,20,.5)':'none';
    dot.style.width=i===current?'10px':'6px';
    dot.style.height=i===current?'10px':'6px';
    dot.style.borderRadius='50%';
  });
}

function buildDots(){
  const dc=document.getElementById('dotContainer');
  if(!dc)return;
  dc.innerHTML='';
  slides.forEach((_,i)=>{
    const dot=document.createElement('button');
    dot.style.cssText='border:none;cursor:pointer;transition:all .3s;padding:0';
    dot.onclick=()=>goTo(i);
    dc.appendChild(dot);
  });
}

// ── Init ──
function init(){
  buildDots();
  renderCurrent();
  updateNav();
  updateProgress();
  updateCounter();
  updateDots();

  document.getElementById('prevBtn').onclick=()=>goTo(current-1);
  document.getElementById('nextBtn').onclick=()=>goTo(current+1);

  document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){e.preventDefault();if(current<slides.length-1)goTo(current+1)}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();if(current>0)goTo(current-1)}
    if(e.key==='Home'){e.preventDefault();goTo(0)}
    if(e.key==='End'){e.preventDefault();goTo(slides.length-1)}
  });

  let tx=0;
  const c=document.getElementById('slideContainer');
  if(c){
    c.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});
    c.addEventListener('touchend',e=>{
      const d=tx-e.changedTouches[0].screenX;
      if(Math.abs(d)>50){if(d>0&&current<slides.length-1)goTo(current+1);else if(d<0&&current>0)goTo(current-1)}
    },{passive:true});
  }

  // Particles
  const p=document.getElementById('particles');
  if(p) for(let i=0;i<35;i++){
    const el=document.createElement('div');
    el.className='particle';
    el.style.left=Math.random()*100+'%';
    el.style.top=Math.random()*100+'%';
    el.style.animation=`float ${8+Math.random()*12}s ${Math.random()*10}s infinite`;
    el.style.width=(1+Math.random()*2)+'px';
    el.style.height=el.style.width;
    el.style.background=['#39FF14','#00E5FF','#B026FF'][Math.floor(Math.random()*3)];
    p.appendChild(el);
  }

  // Orbs
  const o=document.getElementById('orbs');
  if(o) for(let i=0;i<3;i++){
    const orb=document.createElement('div');
    orb.className='orb';
    orb.style.top=Math.random()*80+'%';
    orb.style.left=Math.random()*80+'%';
    orb.style.width=(200+Math.random()*400)+'px';
    orb.style.height=(200+Math.random()*400)+'px';
    orb.style.animationDelay=(Math.random()*10)+'s';
    orb.style.background=['radial-gradient(circle,rgba(57,255,20,.12),transparent 70%)','radial-gradient(circle,rgba(0,229,255,.12),transparent 70%)','radial-gradient(circle,rgba(176,38,255,.12),transparent 70%)'][i];
    o.appendChild(orb);
  }

  // Responsive nav text
  const mql=window.matchMedia('(min-width:480px)');
  const updateNavText=()=>{
    document.querySelectorAll('.nav-text').forEach(el=>el.style.display=mql.matches?'inline':'none');
  };
  mql.addEventListener('change',updateNavText);
  updateNavText();

  // Show logo text on larger screens
  const mql2=window.matchMedia('(min-width:640px)');
  const updateLogo=()=>{
    const el=document.querySelector('.logo-text');
    if(el) el.style.display=mql2.matches?'block':'none';
  };
  mql2.addEventListener('change',updateLogo);
  updateLogo();
}

document.addEventListener('DOMContentLoaded',init);
if(document.readyState!=='loading')init();
</script>
</body>
</html>
